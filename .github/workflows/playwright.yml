name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run full suite every night at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      markers:
        description: "Pytest markers to run (e.g. smoke, regression)"
        required: false
        default: ""

jobs:
  test:
    name: Run ${{ matrix.browser }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps ${{ matrix.browser }}

      - name: Create .env from secrets
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'https://www.saucedemo.com' }}" >> .env
          echo "STANDARD_USER=${{ secrets.STANDARD_USER || 'standard_user' }}"   >> .env
          echo "PASSWORD=${{ secrets.PASSWORD || 'secret_sauce' }}"               >> .env
          echo "HEADLESS=true"                                                     >> .env

      - name: Run tests
        run: |
          MARKERS="${{ github.event.inputs.markers }}"
          if [ -n "$MARKERS" ]; then
            pytest -m "$MARKERS" --browser ${{ matrix.browser }}
          else
            pytest --browser ${{ matrix.browser }}
          fi

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.browser }}
          path: reports/report.html
          retention-days: 14

      - name: Upload screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.browser }}
          path: test-results/
          retention-days: 7
